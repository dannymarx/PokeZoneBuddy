name: Release

on:
  push:
    branches:
      - main
    paths:
      - VERSION
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          set -euo pipefail
          version=$(tr -d ' \n' < VERSION)
          [[ -n "$version" ]] || { echo "VERSION file is empty" >&2; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build app (unsigned)
        run: |
          set -euo pipefail
          xcodebuild \
            -project PokeZoneBuddy.xcodeproj \
            -scheme "PokeZoneBuddy" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build

      - name: Create DMG
        id: dmg
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          APP="build/Build/Products/Release/PokeZoneBuddy.app"
          DMG="PokeZoneBuddy-${VERSION}.dmg"
          STAGE="dist/stage"

          [[ -d "$APP" ]] || { echo "App not found at $APP"; ls -R build/Build/Products/ || true; exit 1; }

          mkdir -p "$STAGE"
          rsync -a "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname "PokeZoneBuddy ${VERSION}" \
            -srcfolder "$STAGE" \
            -ov -format UDZO "$DMG"

          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        id: changelog
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          SECTION=$(awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if ($0 ~ "\\[" ver "\\]") { found=1; next } }
            found { print }
          ' CHANGELOG.md)
          {
            echo "body<<EOF"
            echo "${SECTION:-Release $VERSION}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: PokeZoneBuddy ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: ${{ steps.dmg.outputs.dmg }}
